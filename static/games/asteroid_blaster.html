<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Asteroid Blaster 🚀</title>
  <style>
    :root{
      --bg0:#070a2a;
      --bg1:#0b1242;
      --ui:#0b1538cc;
      --text:#eaf2ff;
      --accent:#7cf7ff;
      --accent2:#ff6fd8;
      --danger:#ff5a5a;
      --ok:#6dff8a;
    }
    html,body{height:100%; margin:0; background:radial-gradient(1200px 800px at 50% 25%, var(--bg1), var(--bg0)); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
    #wrap{height:100%; display:flex; align-items:center; justify-content:center; padding:14px; box-sizing:border-box;}
    #card{
      width:min(980px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.12);
      border-radius:18px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      overflow:hidden;
      position:relative;
    }
    header{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      padding:12px 14px;
      background:linear-gradient(90deg, rgba(124,247,255,0.10), rgba(255,111,216,0.07));
      border-bottom:1px solid rgba(255,255,255,0.12);
    }
    header .title{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:0.4px;}
    header .title .badge{
      font-size:12px; padding:3px 8px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(0,0,0,0.15);
      color:rgba(255,255,255,0.9);
    }
    header .meta{display:flex; gap:10px; align-items:center; font-size:13px; opacity:0.95; flex-wrap:wrap;}
    .pill{
      display:inline-flex; gap:7px; align-items:center;
      padding:6px 10px; border-radius:999px;
      background:rgba(0,0,0,0.18);
      border:1px solid rgba(255,255,255,0.12);
      white-space:nowrap;
    }
    .dot{width:8px; height:8px; border-radius:50%;}
    .dot.mission{background:var(--accent);}
    .dot.lives{background:var(--accent2);}
    .dot.msg{background:var(--ok);}
    #game{
      display:block;
      width:100%;
      height:auto;
      background:transparent;
    }
    #hud{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      background:linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.1));
      border-top:1px solid rgba(255,255,255,0.08);
    }
    #hud .panel{
      background:var(--ui);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:14px;
      padding:10px 12px;
      backdrop-filter: blur(10px);
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
      min-width: 220px;
    }
    #hud .panel.right{min-width: 280px; text-align:right;}
    #hint{
      font-size:12.5px; line-height:1.35;
      opacity:0.95;
    }
    #bigMsg{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      padding:20px;
      text-align:center;
    }
    .overlay{
      pointer-events:none;
      max-width: 680px;
      width:100%;
      padding:18px 18px;
      border-radius:18px;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(10px);
      box-shadow:0 12px 40px rgba(0,0,0,0.35);
    }
    .overlay h1{margin:0 0 8px; font-size:24px; letter-spacing:0.2px;}
    .overlay p{margin:6px 0; opacity:0.95;}
    .kbd{
      display:inline-block;
      padding:2px 6px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.08);
      font-weight:700;
      font-size:12px;
    }
    .subtle{opacity:0.85; font-size:13px;}
    .danger{color:#ffd1d1}
    .ok{color:#d5ffe1}
    @media (max-width:520px){
      header{flex-direction:column; align-items:flex-start;}
      #hud{flex-direction:column; align-items:stretch;}
      #hud .panel.right{text-align:left;}
    }
  </style>
</head>
<body>
<div id="wrap">
  <div id="card">
    <header>
      <div class="title">
        <span style="font-size:18px">🚀 Asteroid Blaster</span>
        <span class="badge">Arcade Mode</span>
      </div>
      <div class="meta">
        <span class="pill"><span class="dot mission"></span><span id="uiMission">Mission 1</span></span>
        <span class="pill"><span class="dot lives"></span><span id="uiLives">Lives: 3</span></span>
        <span class="pill">⭐ <span id="uiScore">0</span></span>
        <span class="pill">⏱️ <span id="uiTimer">60</span>s</span>
        <span class="pill"><span class="dot msg"></span><span id="uiStatus">Ready!</span></span>
        <span class="pill" id="activePowerups" style="display:none;"></span>
      </div>
    </header>

    <canvas id="game" width="960" height="640"></canvas>

    <div id="hud">
      <div class="panel">
        <div id="hint">
          <div><b>Controls:</b> <span class="kbd">←</span> <span class="kbd">→</span> (or A/D) to move &nbsp; <span class="kbd">Space</span> to shoot</div>
          <div class="subtle">Goal: Destroy asteroids and survive each 60-second mission!</div>
        </div>
      </div>
      <div class="panel right">
        <div class="subtle">Tip: Collect power-ups to boost your firepower and defenses!</div>
      </div>
    </div>

    <div id="bigMsg"></div>
  </div>
</div>

<script>
(() => {
  // ---------- Canvas & scaling ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    const card = document.getElementById("card");
    const headerH = card.querySelector("header").getBoundingClientRect().height;
    const maxW = card.getBoundingClientRect().width;
    const maxH = window.innerHeight - 40 - headerH;
    const aspect = 960/640;

    let cssW = Math.min(maxW, 980);
    let cssH = cssW / aspect;
    if (cssH > maxH) {
      cssH = maxH;
      cssW = cssH * aspect;
    }
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
  }
  window.addEventListener("resize", resizeCanvas);

  // ---------- UI ----------
  const uiMission = document.getElementById("uiMission");
  const uiLives = document.getElementById("uiLives");
  const uiStatus = document.getElementById("uiStatus");
  const uiScore = document.getElementById("uiScore");
  const uiTimer = document.getElementById("uiTimer");
  const bigMsg = document.getElementById("bigMsg");
  const activePowerupsEl = document.getElementById("activePowerups");

  // ---------- Audio Engine (Web Audio API) ----------
  let audioCtx = null;
  let musicPlaying = false;
  let musicInterval = null;
  let masterGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
  }

  // Musical state
  let beatStep = 0;
  let totalBeats = 0;
  const BPM = 120;
  const beatInterval = 60 / BPM / 4;
  let energy = 0.5;
  let tension = 0;
  let currentRoot = 55;
  let nextRootChange = 32;
  const roots = [55, 73.4, 82.4, 61.7];
  const pentatonic = [0, 3, 5, 7, 10, 12, 15, 17, 19];

  // Pad synth
  let padOsc = null;
  let padOsc2 = null;
  let padGain = null;
  let padFilter = null;

  function startPad() {
    if (padOsc) return;
    padOsc = audioCtx.createOscillator();
    padOsc2 = audioCtx.createOscillator();
    padGain = audioCtx.createGain();
    padFilter = audioCtx.createBiquadFilter();
    
    padOsc.type = 'sine';
    padOsc2.type = 'triangle';
    padOsc.frequency.value = currentRoot * 2;
    padOsc2.frequency.value = currentRoot * 3;
    
    padFilter.type = 'lowpass';
    padFilter.frequency.value = 400;
    padFilter.Q.value = 2;
    
    padGain.gain.value = 0;
    
    padOsc.connect(padFilter);
    padOsc2.connect(padFilter);
    padFilter.connect(padGain);
    padGain.connect(masterGain);
    
    padOsc.start();
    padOsc2.start();
  }

  function updatePad(time) {
    if (!padOsc) return;
    const targetGain = 0.06 + energy * 0.04;
    padGain.gain.setTargetAtTime(targetGain, time, 0.5);
    padFilter.frequency.setTargetAtTime(300 + energy * 600 + tension * 400, time, 0.3);
    padOsc.frequency.setTargetAtTime(currentRoot * 2, time, 0.2);
  }

  function stopPad() {
    if (padOsc) {
      padOsc.stop();
      padOsc2.stop();
      padOsc = null;
      padOsc2 = null;
    }
  }

  function playKickProc(time, velocity) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120 + tension * 30, time);
    osc.frequency.exponentialRampToValueAtTime(35, time + 0.15);
    gain.gain.setValueAtTime(0.5 * velocity, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.3);
  }

  function playSnareProc(time, velocity) {
    const bufferSize = audioCtx.sampleRate * 0.12;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.8);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1800 + energy * 1200;
    filter.Q.value = 0.8;
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.35 * velocity, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(time);
  }

  function playHatProc(time, open, velocity) {
    const duration = open ? 0.12 : 0.04;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    const decay = open ? 1.2 : 3;
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, decay);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = open ? 6000 : 8000;
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12 * velocity, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(time);
  }

  function playBassProc(time, freq, velocity) {
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    osc.type = 'sawtooth';
    osc2.type = 'square';
    osc.frequency.value = freq;
    osc2.frequency.value = freq * 0.998;
    
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200 + energy * 400, time);
    filter.frequency.exponentialRampToValueAtTime(150, time + 0.2);
    filter.Q.value = 4;
    
    gain.gain.setValueAtTime(0.15 * velocity, time);
    gain.gain.setValueAtTime(0.12 * velocity, time + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.28);
    
    osc.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc2.start(time);
    osc.stop(time + 0.3);
    osc2.stop(time + 0.3);
  }

  function playMelodyNote(time, semitones, velocity) {
    const freq = currentRoot * 4 * Math.pow(2, semitones / 12);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    osc.type = 'triangle';
    osc.frequency.value = freq;
    
    filter.type = 'lowpass';
    filter.frequency.value = 1500 + energy * 1500;
    
    const duration = 0.15 + Math.random() * 0.1;
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(0.07 * velocity, time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + duration + 0.05);
  }

  function scheduleBeat() {
    if (!audioCtx || !musicPlaying) return;
    const time = audioCtx.currentTime + 0.02;
    
    const targetEnergy = 0.4 + Math.sin(totalBeats * 0.02) * 0.2 + tension * 0.3;
    energy += (targetEnergy - energy) * 0.05;
    energy = Math.max(0.3, Math.min(1, energy));
    
    tension += 0.003;
    if (totalBeats % 128 === 0) tension *= 0.3;
    tension = Math.min(tension, 0.8);
    
    const swing = (beatStep % 2 === 1) ? 0.02 : 0;
    const t = time + swing;
    
    if (totalBeats >= nextRootChange && beatStep === 0) {
      const idx = Math.floor(Math.random() * roots.length);
      currentRoot = roots[idx];
      nextRootChange = totalBeats + 16 + Math.floor(Math.random() * 32);
    }
    
    updatePad(t);
    
    // Kick
    const kickProb = (beatStep === 0) ? 0.95 : 
                     (beatStep === 8) ? 0.85 :
                     (beatStep === 4 || beatStep === 12) ? 0.3 * energy :
                     (beatStep === 6 || beatStep === 14) ? 0.15 * energy : 0.02;
    if (Math.random() < kickProb) {
      playKickProc(t, 0.7 + energy * 0.3);
    }
    
    // Snare
    const snareProb = (beatStep === 4 || beatStep === 12) ? 0.92 :
                      (beatStep === 3 || beatStep === 11) ? 0.1 * energy :
                      (beatStep === 7 || beatStep === 15) ? 0.2 * energy : 0.01;
    if (Math.random() < snareProb) {
      const ghostNote = (beatStep !== 4 && beatStep !== 12);
      playSnareProc(t, ghostNote ? 0.3 : 0.7 + energy * 0.25);
    }
    
    // Hi-hat
    const hatProb = 0.7 + energy * 0.25;
    const openProb = (beatStep % 4 === 2) ? 0.3 : 0.05;
    if (Math.random() < hatProb) {
      const isOpen = Math.random() < openProb;
      playHatProc(t, isOpen, 0.5 + energy * 0.4);
    }
    
    // Bass
    const bassProb = (beatStep % 4 === 0) ? 0.9 :
                     (beatStep % 4 === 2) ? 0.4 * energy :
                     (beatStep === 7 || beatStep === 15) ? 0.25 : 0.05;
    if (Math.random() < bassProb) {
      const variation = Math.random();
      const freq = variation < 0.7 ? currentRoot :
                   variation < 0.85 ? currentRoot * 2 :
                   currentRoot * 1.5;
      playBassProc(t, freq, 0.7 + energy * 0.3);
    }
    
    // Melody
    const melodyProb = energy > 0.5 ? 0.12 : 0.04;
    if (Math.random() < melodyProb && beatStep % 2 === 0) {
      const noteIdx = Math.floor(Math.random() * pentatonic.length);
      playMelodyNote(t, pentatonic[noteIdx], 0.6 + tension * 0.4);
    }
    
    beatStep = (beatStep + 1) % 16;
    totalBeats++;
  }

  function startMusic() {
    if (musicPlaying) return;
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    musicPlaying = true;
    beatStep = 0;
    totalBeats = 0;
    energy = 0.5;
    tension = 0;
    currentRoot = 55;
    startPad();
    musicInterval = setInterval(scheduleBeat, beatInterval * 1000);
  }

  function stopMusic() {
    musicPlaying = false;
    if (musicInterval) {
      clearInterval(musicInterval);
      musicInterval = null;
    }
    stopPad();
  }

  // Victory/celebration music
  let celebrationPlaying = false;
  let celebrationInterval = null;
  let celebBeat = 0;

  function playCelebrationNote(time, freq, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + dur);
  }

  function scheduleCelebrationBeat() {
    if (!audioCtx || !celebrationPlaying) return;
    const time = audioCtx.currentTime + 0.02;
    
    // Triumphant major chord arpeggios
    const chords = [
      [261.6, 329.6, 392],   // C major
      [329.6, 415.3, 493.9], // E major
      [392, 493.9, 587.3],   // G major
      [523.3, 659.3, 784]    // C major (octave up)
    ];
    
    const chordIdx = Math.floor(celebBeat / 4) % chords.length;
    const noteIdx = celebBeat % 3;
    const chord = chords[chordIdx];
    
    playCelebrationNote(time, chord[noteIdx], 0.3);
    
    // Add sparkle notes
    if (celebBeat % 2 === 0) {
      playCelebrationNote(time + 0.1, chord[noteIdx] * 2, 0.15);
    }
    
    celebBeat++;
  }

  function startCelebrationMusic() {
    if (celebrationPlaying) return;
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    celebrationPlaying = true;
    celebBeat = 0;
    celebrationInterval = setInterval(scheduleCelebrationBeat, 150);
  }

  function stopCelebrationMusic() {
    celebrationPlaying = false;
    if (celebrationInterval) {
      clearInterval(celebrationInterval);
      celebrationInterval = null;
    }
  }

  // Sound effects
  function playLaserSound() {
    if (!audioCtx) return;
    const time = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(880, time);
    osc.frequency.exponentialRampToValueAtTime(220, time + 0.1);
    gain.gain.setValueAtTime(0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.12);
  }

  function playExplosionSound(big = false) {
    if (!audioCtx) return;
    const time = audioCtx.currentTime;
    
    // Noise burst
    const bufferSize = audioCtx.sampleRate * (big ? 0.4 : 0.2);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, big ? 1 : 2);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = big ? 800 : 1200;
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(big ? 0.4 : 0.25, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + (big ? 0.4 : 0.2));
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(time);

    // Sub bass thump for big explosions
    if (big) {
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, time);
      osc.frequency.exponentialRampToValueAtTime(20, time + 0.3);
      oscGain.gain.setValueAtTime(0.4, time);
      oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
      osc.connect(oscGain);
      oscGain.connect(masterGain);
      osc.start(time);
      osc.stop(time + 0.35);
    }
  }

  function playPowerupSound() {
    if (!audioCtx) return;
    const time = audioCtx.currentTime;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, time + i * 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, time + i * 0.05 + 0.2);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(time + i * 0.05);
      osc.stop(time + i * 0.05 + 0.2);
    });
  }

  function playHurtSound() {
    if (!audioCtx) return;
    const time = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(50, time + 0.3);
    gain.gain.setValueAtTime(0.3, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.35);
  }

  function playFireworkSound() {
    if (!audioCtx) return;
    const time = audioCtx.currentTime;
    
    // Whistle up
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(800 + Math.random() * 400, time + 0.3);
    gain.gain.setValueAtTime(0.1, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.35);
    
    // Pop
    setTimeout(() => {
      const bufferSize = audioCtx.sampleRate * 0.15;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      noise.connect(noiseGain);
      noiseGain.connect(masterGain);
      noise.start();
    }, 300);
  }

  function setOverlay(html) {
    if (!html) { bigMsg.innerHTML = ""; return; }
    bigMsg.innerHTML = `<div class="overlay">${html}</div>`;
  }

  // ---------- Helpers ----------
  const rand = (a,b) => a + Math.random()*(b-a);
  const randi = (a,b) => Math.floor(rand(a,b+1));
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const dist2 = (ax,ay,bx,by) => (ax-bx)**2 + (ay-by)**2;

  // ---------- Parallax Stars background ----------
  const starLayers = [];
  function initStars() {
    starLayers.length = 0;
    // Create 3 layers with different parallax speeds
    for (let layer = 0; layer < 3; layer++) {
      const stars = [];
      const count = 60 + layer * 30; // More stars in back layers
      const speedMult = 0.3 + layer * 0.35; // Back layers move slower
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: rand(0.5, 1.5) + layer * 0.5,
          tw: rand(0, Math.PI * 2),
          sp: rand(0.6, 2.2),
          hue: rand(180, 320),
          speed: (20 + layer * 30) * speedMult
        });
      }
      starLayers.push(stars);
    }
  }

  function updateStars(dt) {
    for (const layer of starLayers) {
      for (const star of layer) {
        star.y += star.speed * dt;
        if (star.y > canvas.height + 10) {
          star.y = -10;
          star.x = Math.random() * canvas.width;
        }
      }
    }
  }

  // ---------- Game state ----------
  const keys = new Set();
  window.addEventListener("keydown", (e) => {
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","w","a","s","d","W","A","S","D"," "].includes(e.key)) e.preventDefault();
    keys.add(e.key);
    if (e.key === " " && (state.mode === "intro" || state.mode === "gameover")) {
      startGame();
    } else if (e.key === " " && state.mode === "missioncomplete") {
      nextMission();
    }
  });
  window.addEventListener("keyup", (e)=> keys.delete(e.key));

  // Touch support
  let touchX = -1;
  let touchActive = false;
  let touchFiring = false;

  function getCanvasMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    return (e.clientX - rect.left) * scaleX;
  }

  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchX = getCanvasMousePos(touch);
    touchActive = true;
    touchFiring = true;
    if (state.mode === "intro" || state.mode === "gameover") {
      startGame();
    } else if (state.mode === "missioncomplete") {
      nextMission();
    }
  });

  canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchX = getCanvasMousePos(touch);
  });

  canvas.addEventListener("touchend", () => {
    touchActive = false;
    touchFiring = false;
  });

  canvas.addEventListener("click", (e) => {
    if (state.mode === "intro" || state.mode === "gameover") {
      startGame();
    } else if (state.mode === "missioncomplete") {
      nextMission();
    }
  });

  // Powerup types
  const POWERUP_TYPES = {
    SHIELD: { color: '#4af', icon: '🛡️', duration: 8000, name: 'Shield' },
    TRIPLE: { color: '#f4a', icon: '🔱', duration: 10000, name: 'Triple Shot' },
    RAPID: { color: '#ff4', icon: '⚡', duration: 8000, name: 'Rapid Fire' },
    SPREAD: { color: '#4f4', icon: '🌟', duration: 10000, name: 'Spread Shot' },
    LIFE: { color: '#f88', icon: '💖', duration: 0, name: 'Extra Life' },
    SLOW: { color: '#88f', icon: '🕐', duration: 6000, name: 'Slow Time' },
    BOMB: { color: '#f84', icon: '💥', duration: 0, name: 'Screen Clear' }
  };

  const state = {
    mode: "intro", // intro | playing | missioncomplete | transition | gameover
    mission: 1,
    lives: 3,
    score: 0,
    // Timer
    missionTime: 60,
    timeRemaining: 60,
    // Player
    px: 480,
    py: 580,
    pr: 18,
    vx: 0,
    speed: 400,
    // Lasers
    lasers: [],
    lastShot: 0,
    fireRate: 180, // ms between shots
    // Asteroids
    asteroids: [],
    asteroidSpawnTimer: 0,
    asteroidSpawnRate: 1.2, // seconds between spawns
    // Powerups
    powerups: [],
    shieldActive: false,
    shieldTimer: 0,
    tripleActive: false,
    tripleTimer: 0,
    rapidActive: false,
    rapidTimer: 0,
    spreadActive: false,
    spreadTimer: 0,
    slowActive: false,
    slowTimer: 0,
    // Explosions
    explosions: [],
    // Particles
    particles: [],
    // Fireworks (for victory)
    fireworks: [],
    // Transition state
    transitionTimer: 0,
    shipTargetY: 0,
    stationY: 0,
    // Timing
    lastT: 0,
    invulnerable: 0 // brief invulnerability after hit
  };

  function missionConfig(mission) {
    return {
      asteroidSpawnRate: Math.max(0.4, 1.5 - mission * 0.15),
      asteroidSpeed: 80 + mission * 20,
      asteroidMaxSize: Math.min(3, 1 + Math.floor(mission / 2)),
      powerupChance: 0.15 + mission * 0.02
    };
  }

  function buildMission(mission) {
    const cfg = missionConfig(mission);
    state.asteroidSpawnRate = cfg.asteroidSpawnRate;
    state.asteroidSpawnTimer = 0;
    state.asteroids = [];
    state.lasers = [];
    state.powerups = [];
    state.explosions = [];
    state.particles = [];
    state.fireworks = [];
    state.timeRemaining = state.missionTime;
    
    // Reset player position
    state.px = canvas.width / 2;
    state.py = canvas.height - 60;
    state.vx = 0;
    
    // Reset powerups
    state.shieldActive = false;
    state.shieldTimer = 0;
    state.tripleActive = false;
    state.tripleTimer = 0;
    state.rapidActive = false;
    state.rapidTimer = 0;
    state.spreadActive = false;
    state.spreadTimer = 0;
    state.slowActive = false;
    state.slowTimer = 0;
    state.invulnerable = 0;
    
    uiMission.textContent = `Mission ${state.mission}`;
    uiLives.textContent = `Lives: ${state.lives}`;
    uiScore.textContent = state.score;
    uiTimer.textContent = Math.ceil(state.timeRemaining);
    uiStatus.textContent = "Destroy the asteroids!";
  }

  // ---------- Player movement ----------
  function movePlayer(dt) {
    let dx = 0;
    
    const lt = keys.has("ArrowLeft") || keys.has("a") || keys.has("A");
    const rt = keys.has("ArrowRight") || keys.has("d") || keys.has("D");
    
    if (touchActive) {
      // Move toward touch position
      const diff = touchX - state.px;
      if (Math.abs(diff) > 10) {
        dx = diff > 0 ? 1 : -1;
      }
    } else {
      if (lt) dx -= 1;
      if (rt) dx += 1;
    }
    
    // Smooth acceleration
    const targetVx = dx * state.speed;
    state.vx += (targetVx - state.vx) * Math.min(1, dt * 12);
    
    state.px += state.vx * dt;
    state.px = clamp(state.px, state.pr + 10, canvas.width - state.pr - 10);
  }

  // ---------- Shooting ----------
  function shoot() {
    const now = performance.now();
    const fireRate = state.rapidActive ? state.fireRate * 0.4 : state.fireRate;
    
    if (now - state.lastShot < fireRate) return;
    state.lastShot = now;
    
    playLaserSound();
    
    const laserSpeed = 600;
    
    if (state.spreadActive) {
      // 5-way spread
      for (let i = -2; i <= 2; i++) {
        const angle = -Math.PI/2 + i * 0.2;
        state.lasers.push({
          x: state.px,
          y: state.py - state.pr,
          vx: Math.cos(angle) * laserSpeed,
          vy: Math.sin(angle) * laserSpeed,
          r: 4
        });
      }
    } else if (state.tripleActive) {
      // Triple shot
      state.lasers.push({
        x: state.px - 15,
        y: state.py - state.pr,
        vx: 0,
        vy: -laserSpeed,
        r: 4
      });
      state.lasers.push({
        x: state.px,
        y: state.py - state.pr,
        vx: 0,
        vy: -laserSpeed,
        r: 4
      });
      state.lasers.push({
        x: state.px + 15,
        y: state.py - state.pr,
        vx: 0,
        vy: -laserSpeed,
        r: 4
      });
    } else {
      // Single shot
      state.lasers.push({
        x: state.px,
        y: state.py - state.pr,
        vx: 0,
        vy: -laserSpeed,
        r: 4
      });
    }
  }

  function updateLasers(dt) {
    for (let i = state.lasers.length - 1; i >= 0; i--) {
      const laser = state.lasers[i];
      laser.x += laser.vx * dt;
      laser.y += laser.vy * dt;
      
      // Remove off-screen
      if (laser.y < -20 || laser.y > canvas.height + 20 || 
          laser.x < -20 || laser.x > canvas.width + 20) {
        state.lasers.splice(i, 1);
      }
    }
  }

  // ---------- Asteroids ----------
  function spawnAsteroid(size = null) {
    const cfg = missionConfig(state.mission);
    const sz = size !== null ? size : randi(1, cfg.asteroidMaxSize);
    const radius = 15 + sz * 12;
    
    state.asteroids.push({
      x: rand(radius, canvas.width - radius),
      y: -radius - 20,
      vx: rand(-30, 30),
      vy: cfg.asteroidSpeed + rand(-20, 40) + sz * 10,
      r: radius,
      size: sz, // 1 = small, 2 = medium, 3 = large
      rot: rand(0, Math.PI * 2),
      spin: rand(-2, 2),
      shape: randi(0, 2), // Different asteroid shapes
      points: sz * 10 // Points for destroying
    });
  }

  function updateAsteroids(dt) {
    const timeMult = state.slowActive ? 0.3 : 1;
    
    for (let i = state.asteroids.length - 1; i >= 0; i--) {
      const ast = state.asteroids[i];
      ast.x += ast.vx * dt * timeMult;
      ast.y += ast.vy * dt * timeMult;
      ast.rot += ast.spin * dt * timeMult;
      
      // Wrap horizontally
      if (ast.x < -ast.r - 20) ast.x = canvas.width + ast.r;
      if (ast.x > canvas.width + ast.r + 20) ast.x = -ast.r;
      
      // Remove if off bottom
      if (ast.y > canvas.height + ast.r + 50) {
        state.asteroids.splice(i, 1);
      }
    }
    
    // Spawn new asteroids
    state.asteroidSpawnTimer += dt;
    if (state.asteroidSpawnTimer >= state.asteroidSpawnRate) {
      state.asteroidSpawnTimer = 0;
      spawnAsteroid();
    }
  }

  function breakAsteroid(ast, index) {
    state.score += ast.points;
    uiScore.textContent = state.score;
    
    // Create explosion
    createExplosion(ast.x, ast.y, ast.r);
    
    // Break into smaller pieces
    if (ast.size > 1) {
      const cfg = missionConfig(state.mission);
      for (let i = 0; i < 2; i++) {
        const newSize = ast.size - 1;
        const newRadius = 15 + newSize * 12;
        state.asteroids.push({
          x: ast.x + rand(-10, 10),
          y: ast.y + rand(-10, 10),
          vx: rand(-60, 60),
          vy: ast.vy * 0.8 + rand(-20, 20),
          r: newRadius,
          size: newSize,
          rot: rand(0, Math.PI * 2),
          spin: rand(-3, 3),
          shape: randi(0, 2),
          points: newSize * 10
        });
      }
    }
    
    // Chance to spawn powerup
    const cfg = missionConfig(state.mission);
    if (Math.random() < cfg.powerupChance) {
      spawnPowerup(ast.x, ast.y);
    }
    
    state.asteroids.splice(index, 1);
    playExplosionSound(ast.size >= 2);
  }

  // ---------- Powerups ----------
  function spawnPowerup(x, y) {
    const types = Object.keys(POWERUP_TYPES);
    const type = types[randi(0, types.length - 1)];
    
    state.powerups.push({
      x: x,
      y: y,
      vy: 60,
      type: type,
      bobPhase: rand(0, Math.PI * 2),
      age: 0
    });
  }

  function updatePowerups(dt) {
    for (let i = state.powerups.length - 1; i >= 0; i--) {
      const p = state.powerups[i];
      p.y += p.vy * dt;
      p.age += dt;
      
      // Remove if off screen
      if (p.y > canvas.height + 30) {
        state.powerups.splice(i, 1);
        continue;
      }
      
      // Check collision with player
      const dx = p.x - state.px;
      const dy = p.y - state.py;
      if (dx * dx + dy * dy < (state.pr + 20) * (state.pr + 20)) {
        collectPowerup(p);
        state.powerups.splice(i, 1);
      }
    }
  }

  function collectPowerup(p) {
    playPowerupSound();
    const info = POWERUP_TYPES[p.type];
    
    switch(p.type) {
      case 'SHIELD':
        state.shieldActive = true;
        state.shieldTimer = info.duration;
        uiStatus.textContent = "🛡️ Shield Active!";
        break;
      case 'TRIPLE':
        state.tripleActive = true;
        state.tripleTimer = info.duration;
        state.spreadActive = false; // Override spread
        uiStatus.textContent = "🔱 Triple Shot!";
        break;
      case 'RAPID':
        state.rapidActive = true;
        state.rapidTimer = info.duration;
        uiStatus.textContent = "⚡ Rapid Fire!";
        break;
      case 'SPREAD':
        state.spreadActive = true;
        state.spreadTimer = info.duration;
        state.tripleActive = false; // Override triple
        uiStatus.textContent = "🌟 Spread Shot!";
        break;
      case 'LIFE':
        state.lives = Math.min(state.lives + 1, 5);
        uiLives.textContent = `Lives: ${state.lives}`;
        uiStatus.textContent = "💖 Extra Life!";
        break;
      case 'SLOW':
        state.slowActive = true;
        state.slowTimer = info.duration;
        uiStatus.textContent = "🕐 Time Slowed!";
        break;
      case 'BOMB':
        // Clear all asteroids on screen
        for (const ast of state.asteroids) {
          createExplosion(ast.x, ast.y, ast.r);
          state.score += ast.points;
        }
        state.asteroids = [];
        uiScore.textContent = state.score;
        uiStatus.textContent = "💥 Screen Cleared!";
        playExplosionSound(true);
        break;
    }
  }

  function updatePowerupTimers(dt) {
    const dtMs = dt * 1000;
    
    if (state.shieldActive) {
      state.shieldTimer -= dtMs;
      if (state.shieldTimer <= 0) {
        state.shieldActive = false;
        uiStatus.textContent = "Shield depleted!";
      }
    }
    
    if (state.tripleActive) {
      state.tripleTimer -= dtMs;
      if (state.tripleTimer <= 0) {
        state.tripleActive = false;
      }
    }
    
    if (state.rapidActive) {
      state.rapidTimer -= dtMs;
      if (state.rapidTimer <= 0) {
        state.rapidActive = false;
      }
    }
    
    if (state.spreadActive) {
      state.spreadTimer -= dtMs;
      if (state.spreadTimer <= 0) {
        state.spreadActive = false;
      }
    }
    
    if (state.slowActive) {
      state.slowTimer -= dtMs;
      if (state.slowTimer <= 0) {
        state.slowActive = false;
        uiStatus.textContent = "Time restored!";
      }
    }
    
    if (state.invulnerable > 0) {
      state.invulnerable -= dtMs;
    }
    
    // Update HUD
    const actives = [];
    if (state.shieldActive) actives.push(`🛡️${Math.ceil(state.shieldTimer/1000)}s`);
    if (state.tripleActive) actives.push(`🔱${Math.ceil(state.tripleTimer/1000)}s`);
    if (state.rapidActive) actives.push(`⚡${Math.ceil(state.rapidTimer/1000)}s`);
    if (state.spreadActive) actives.push(`🌟${Math.ceil(state.spreadTimer/1000)}s`);
    if (state.slowActive) actives.push(`🕐${Math.ceil(state.slowTimer/1000)}s`);
    
    if (actives.length > 0) {
      activePowerupsEl.style.display = '';
      activePowerupsEl.textContent = actives.join(' ');
    } else {
      activePowerupsEl.style.display = 'none';
    }
  }

  // ---------- Collisions ----------
  function checkCollisions() {
    // Laser vs Asteroid
    for (let li = state.lasers.length - 1; li >= 0; li--) {
      const laser = state.lasers[li];
      for (let ai = state.asteroids.length - 1; ai >= 0; ai--) {
        const ast = state.asteroids[ai];
        const dx = laser.x - ast.x;
        const dy = laser.y - ast.y;
        if (dx * dx + dy * dy < (laser.r + ast.r) * (laser.r + ast.r)) {
          state.lasers.splice(li, 1);
          breakAsteroid(ast, ai);
          break;
        }
      }
    }
    
    // Player vs Asteroid
    if (state.invulnerable <= 0) {
      for (let ai = state.asteroids.length - 1; ai >= 0; ai--) {
        const ast = state.asteroids[ai];
        const dx = state.px - ast.x;
        const dy = state.py - ast.y;
        const hitDist = state.pr + ast.r - 5;
        
        if (dx * dx + dy * dy < hitDist * hitDist) {
          if (state.shieldActive) {
            // Shield absorbs hit
            state.shieldActive = false;
            state.shieldTimer = 0;
            breakAsteroid(ast, ai);
            uiStatus.textContent = "Shield blocked impact!";
            state.invulnerable = 500;
          } else {
            // Take damage
            playerHit();
            breakAsteroid(ast, ai);
          }
          break;
        }
      }
    }
  }

  function playerHit() {
    state.lives--;
    uiLives.textContent = `Lives: ${state.lives}`;
    playHurtSound();
    state.invulnerable = 2000; // 2 seconds invulnerability
    
    // Create particles at player position
    for (let i = 0; i < 20; i++) {
      state.particles.push({
        x: state.px,
        y: state.py,
        vx: rand(-150, 150),
        vy: rand(-150, 150),
        r: rand(2, 5),
        life: rand(0.3, 0.8),
        maxLife: 0.8,
        color: Math.random() > 0.5 ? '#ff6fd8' : '#7cf7ff'
      });
    }
    
    if (state.lives <= 0) {
      gameOver();
    } else {
      uiStatus.textContent = "💥 Ouch! Be careful!";
    }
  }

  // ---------- Explosions & Particles ----------
  function createExplosion(x, y, size) {
    state.explosions.push({
      x, y,
      r: size,
      maxR: size * 2,
      age: 0,
      maxAge: 0.4
    });
    
    // Spawn particles
    const count = Math.floor(size / 3) + 5;
    for (let i = 0; i < count; i++) {
      const angle = rand(0, Math.PI * 2);
      const speed = rand(50, 150);
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: rand(2, 4),
        life: rand(0.3, 0.7),
        maxLife: 0.7,
        color: ['#ff9', '#fa5', '#f55', '#fff'][randi(0, 3)]
      });
    }
  }

  function updateExplosions(dt) {
    for (let i = state.explosions.length - 1; i >= 0; i--) {
      const exp = state.explosions[i];
      exp.age += dt;
      exp.r = exp.maxR * (exp.age / exp.maxAge);
      
      if (exp.age >= exp.maxAge) {
        state.explosions.splice(i, 1);
      }
    }
  }

  function updateParticles(dt) {
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      
      if (p.life <= 0) {
        state.particles.splice(i, 1);
      }
    }
  }

  // ---------- Fireworks ----------
  function spawnFirework() {
    const x = rand(100, canvas.width - 100);
    const y = rand(100, canvas.height / 2);
    const hue = rand(0, 360);
    
    playFireworkSound();
    
    state.fireworks.push({
      x, y,
      particles: [],
      age: 0,
      maxAge: 1.5,
      hue
    });
    
    // Create firework particles
    const fw = state.fireworks[state.fireworks.length - 1];
    const count = 30;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const speed = rand(80, 150);
      fw.particles.push({
        x: fw.x,
        y: fw.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: rand(2, 4),
        hueOffset: rand(-20, 20)
      });
    }
  }

  function updateFireworks(dt) {
    for (let i = state.fireworks.length - 1; i >= 0; i--) {
      const fw = state.fireworks[i];
      fw.age += dt;
      
      for (const p of fw.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 50 * dt; // Gravity
        p.vx *= 0.98;
        p.vy *= 0.98;
      }
      
      if (fw.age >= fw.maxAge) {
        state.fireworks.splice(i, 1);
      }
    }
  }

  // ---------- Drawing ----------
  function drawBackground(t) {
    // Space gradient
    const g = ctx.createRadialGradient(canvas.width*0.5, canvas.height*0.35, 50, canvas.width*0.5, canvas.height*0.35, canvas.width*0.8);
    g.addColorStop(0, "rgba(124,247,255,0.08)");
    g.addColorStop(0.4, "rgba(255,111,216,0.05)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Parallax stars
    for (let li = 0; li < starLayers.length; li++) {
      const layer = starLayers[li];
      const alpha = 0.3 + li * 0.2;
      for (const s of layer) {
        const tw = 0.55 + 0.45*Math.sin(s.tw + t*0.001*s.sp);
        ctx.beginPath();
        ctx.fillStyle = `hsla(${s.hue}, 90%, 85%, ${alpha + 0.4*tw})`;
        ctx.arc(s.x, s.y, s.r*tw, 0, Math.PI*2);
        ctx.fill();
      }
    }

    // Nebula blobs
    for (let i=0; i<3; i++) {
      const x = (canvas.width*(0.2 + 0.3*i)) + 40*Math.sin(t*0.0004 + i);
      const y = canvas.height*(0.2 + 0.15*i) + 30*Math.cos(t*0.0005 + i*2);
      const rg = ctx.createRadialGradient(x,y, 0, x,y, 120);
      rg.addColorStop(0, `rgba(124,247,255,0.06)`);
      rg.addColorStop(1, `rgba(0,0,0,0)`);
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(x,y,120,0,Math.PI*2); ctx.fill();
    }

    // Slow time effect
    if (state.slowActive) {
      ctx.save();
      ctx.globalAlpha = 0.1 + 0.05 * Math.sin(t * 0.003);
      ctx.fillStyle = '#88f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
  }

  function drawSpaceship(tNow) {
    const x = state.px;
    const y = state.py;
    const r = state.pr;

    ctx.save();
    ctx.translate(x, y);
    // Ship faces up (no rotation)

    // Invulnerability flicker
    if (state.invulnerable > 0 && Math.floor(tNow / 80) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Glow
    ctx.shadowBlur = 18;
    ctx.shadowColor = "rgba(124,247,255,0.35)";

    // Ship body (pointing up)
    const body = ctx.createLinearGradient(0, -r, 0, r);
    body.addColorStop(0, "rgba(124,247,255,0.95)");
    body.addColorStop(1, "rgba(255,255,255,0.95)");
    ctx.fillStyle = body;

    ctx.beginPath();
    ctx.moveTo(0, -r * 1.35);
    ctx.lineTo(-r * 0.85, r * 0.9);
    ctx.lineTo(0, r * 0.55);
    ctx.lineTo(r * 0.85, r * 0.9);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(30, 0, 60, 0.55)";
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.1, r * 0.35, r * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Fins
    ctx.fillStyle = "rgba(255,111,216,0.85)";
    ctx.beginPath();
    ctx.moveTo(-r * 0.25, r * 0.25);
    ctx.lineTo(-r * 1.0, r * 1.05);
    ctx.lineTo(-r * 0.05, r * 0.65);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(r * 0.25, r * 0.25);
    ctx.lineTo(r * 1.0, r * 1.05);
    ctx.lineTo(r * 0.05, r * 0.65);
    ctx.closePath();
    ctx.fill();

    // Engine flame
    const flick = 0.7 + 0.3 * Math.sin(tNow * 0.03);
    const flameLen = r * (0.8 + 0.4 * flick);
    
    const flame = ctx.createLinearGradient(0, r * 0.6, 0, r * 0.6 + flameLen);
    flame.addColorStop(0, "rgba(255,255,255,0.85)");
    flame.addColorStop(0.4, "rgba(255,214,102,0.85)");
    flame.addColorStop(1, "rgba(255,90,90,0)");
    ctx.fillStyle = flame;
    ctx.beginPath();
    ctx.moveTo(-r * 0.2, r * 0.55);
    ctx.lineTo(0, r * 0.55 + flameLen);
    ctx.lineTo(r * 0.2, r * 0.55);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Shield effect
    if (state.shieldActive) {
      ctx.save();
      const pulse = 0.7 + 0.3 * Math.sin(tNow * 0.01);
      const shieldR = state.pr * 2.2;
      
      ctx.globalAlpha = 0.3 * pulse;
      const grad = ctx.createRadialGradient(state.px, state.py, 0, state.px, state.py, shieldR);
      grad.addColorStop(0, 'rgba(100,200,255,0)');
      grad.addColorStop(0.7, 'rgba(100,200,255,0.3)');
      grad.addColorStop(1, 'rgba(100,200,255,0.6)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(state.px, state.py, shieldR, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.globalAlpha = 0.6 * pulse;
      ctx.strokeStyle = '#4af';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(state.px, state.py, shieldR, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.restore();
    }
  }

  function drawLasers() {
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = "rgba(124,247,255,0.8)";
    
    for (const laser of state.lasers) {
      const grad = ctx.createLinearGradient(laser.x, laser.y - 15, laser.x, laser.y + 5);
      grad.addColorStop(0, 'rgba(124,247,255,0)');
      grad.addColorStop(0.3, 'rgba(124,247,255,1)');
      grad.addColorStop(1, 'rgba(255,255,255,1)');
      ctx.fillStyle = grad;
      
      ctx.beginPath();
      ctx.ellipse(laser.x, laser.y, laser.r * 0.6, laser.r * 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawAsteroids(tNow) {
    for (const ast of state.asteroids) {
      ctx.save();
      ctx.translate(ast.x, ast.y);
      ctx.rotate(ast.rot);

      // Glow
      ctx.shadowBlur = 12;
      ctx.shadowColor = "rgba(255,150,100,0.2)";

      // Rock body
      const g = ctx.createRadialGradient(-ast.r * 0.3, -ast.r * 0.25, ast.r * 0.2, 0, 0, ast.r * 1.2);
      g.addColorStop(0, "rgba(255,255,255,0.8)");
      g.addColorStop(0.25, "rgba(180,160,130,0.95)");
      g.addColorStop(1, "rgba(90,70,50,0.95)");
      ctx.fillStyle = g;

      // Bumpy shape
      ctx.beginPath();
      const bumps = 8 + ast.shape * 2;
      for (let i = 0; i <= bumps; i++) {
        const angle = (i / bumps) * Math.PI * 2;
        const rr = ast.r * (0.75 + 0.25 * Math.sin(i * 2.3 + ast.shape));
        const px = Math.cos(angle) * rr;
        const py = Math.sin(angle) * rr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      // Craters
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = "rgba(50,30,20,0.4)";
      const craterCount = 2 + ast.size;
      for (let i = 0; i < craterCount; i++) {
        const cx = rand(-ast.r * 0.4, ast.r * 0.4);
        const cy = rand(-ast.r * 0.4, ast.r * 0.4);
        const cr = rand(ast.r * 0.1, ast.r * 0.2);
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  }

  function drawPowerups(tNow) {
    for (const p of state.powerups) {
      const info = POWERUP_TYPES[p.type];
      const bob = Math.sin(tNow * 0.004 + p.bobPhase) * 5;
      const y = p.y + bob;
      const r = 18;
      
      ctx.save();
      ctx.translate(p.x, y);
      
      // Outer glow
      ctx.shadowBlur = 20;
      ctx.shadowColor = info.color;
      
      // Pulsing ring
      const pulse = 0.8 + 0.2 * Math.sin(tNow * 0.006 + p.bobPhase);
      ctx.strokeStyle = info.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 * pulse;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.4 * pulse, 0, Math.PI * 2);
      ctx.stroke();
      
      // Background
      ctx.globalAlpha = 0.9;
      ctx.shadowBlur = 0;
      const grad = ctx.createRadialGradient(0, -r * 0.3, 0, 0, 0, r);
      grad.addColorStop(0, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.5, info.color);
      grad.addColorStop(1, 'rgba(0,0,0,0.3)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      
      // Icon
      ctx.globalAlpha = 1;
      ctx.font = `${r * 1.1}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(info.icon, 0, 2);
      
      ctx.restore();
    }
  }

  function drawExplosions() {
    for (const exp of state.explosions) {
      ctx.save();
      const progress = exp.age / exp.maxAge;
      ctx.globalAlpha = 1 - progress;
      
      const grad = ctx.createRadialGradient(exp.x, exp.y, 0, exp.x, exp.y, exp.r);
      grad.addColorStop(0, 'rgba(255,255,200,0.9)');
      grad.addColorStop(0.3, 'rgba(255,150,50,0.7)');
      grad.addColorStop(0.7, 'rgba(255,50,50,0.4)');
      grad.addColorStop(1, 'rgba(255,50,50,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(exp.x, exp.y, exp.r, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of state.particles) {
      ctx.save();
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFireworks() {
    for (const fw of state.fireworks) {
      const progress = fw.age / fw.maxAge;
      ctx.save();
      ctx.globalAlpha = 1 - progress;
      
      for (const p of fw.particles) {
        ctx.fillStyle = `hsl(${fw.hue + p.hueOffset}, 100%, 70%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (1 - progress * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
    }
  }

  function drawSpaceStation(y, tNow) {
    const x = canvas.width / 2;
    
    ctx.save();
    ctx.translate(x, y);
    
    // Main body
    ctx.shadowBlur = 20;
    ctx.shadowColor = "rgba(124,247,255,0.5)";
    
    const bodyGrad = ctx.createLinearGradient(-80, 0, 80, 0);
    bodyGrad.addColorStop(0, 'rgba(100,100,120,1)');
    bodyGrad.addColorStop(0.5, 'rgba(200,200,220,1)');
    bodyGrad.addColorStop(1, 'rgba(100,100,120,1)');
    ctx.fillStyle = bodyGrad;
    
    // Central hub
    ctx.beginPath();
    ctx.arc(0, 0, 40, 0, Math.PI * 2);
    ctx.fill();
    
    // Solar panels
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(40,60,100,0.9)';
    ctx.fillRect(-120, -15, 70, 30);
    ctx.fillRect(50, -15, 70, 30);
    
    // Panel lines
    ctx.strokeStyle = 'rgba(100,150,255,0.5)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(-120 + i * 14, -15);
      ctx.lineTo(-120 + i * 14, 15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(50 + i * 14, -15);
      ctx.lineTo(50 + i * 14, 15);
      ctx.stroke();
    }
    
    // Docking ring
    ctx.strokeStyle = 'rgba(255,111,216,0.8)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 50, 25, 0, Math.PI * 2);
    ctx.stroke();
    
    // Blinking lights
    const blink = Math.floor(tNow / 300) % 2 === 0;
    ctx.fillStyle = blink ? '#f44' : '#844';
    ctx.beginPath();
    ctx.arc(-35, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = blink ? '#4f4' : '#484';
    ctx.beginPath();
    ctx.arc(35, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Windows
    ctx.fillStyle = 'rgba(200,230,255,0.9)';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(i * 12, -5, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.restore();
  }

  function drawFrame(tNow) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground(tNow);
    
    if (state.mode === "playing") {
      drawAsteroids(tNow);
      drawPowerups(tNow);
      drawLasers();
      drawExplosions();
      drawParticles();
      drawSpaceship(tNow);
    } else if (state.mode === "transition" || state.mode === "missioncomplete") {
      drawSpaceStation(state.stationY, tNow);
      drawFireworks();
      drawParticles();
      drawSpaceship(tNow);
    } else if (state.mode === "intro" || state.mode === "gameover") {
      // Just show ship at rest
      drawSpaceship(tNow);
    }
    
    // Vignette
    const vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.25, canvas.width/2, canvas.height/2, canvas.width*0.62);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, "rgba(0,0,0,0.35)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ---------- Game flow ----------
  function startGame() {
    state.mission = 1;
    state.lives = 3;
    state.score = 0;
    state.mode = "playing";
    buildMission(state.mission);
    setOverlay("");
    startMusic();
  }

  function nextMission() {
    state.mission++;
    state.mode = "playing";
    buildMission(state.mission);
    setOverlay("");
    stopCelebrationMusic();
    startMusic();
  }

  function missionComplete() {
    state.mode = "transition";
    stopMusic();
    
    // Set up transition animation
    state.transitionTimer = 0;
    state.shipTargetY = 150;
    state.stationY = -100;
    state.fireworks = [];
    
    // Clear remaining asteroids
    state.asteroids = [];
    state.powerups = [];
    state.lasers = [];
    
    uiStatus.textContent = "Mission Complete!";
  }

  function updateTransition(dt) {
    state.transitionTimer += dt;
    
    // Move ship up toward station
    state.py += (state.shipTargetY - state.py) * dt * 2;
    
    // Move station down into view
    const stationTarget = 200;
    state.stationY += (stationTarget - state.stationY) * dt * 2;
    
    // Spawn fireworks
    if (state.transitionTimer > 1 && Math.random() < dt * 3) {
      spawnFirework();
    }
    
    // After 2 seconds, start celebration music and show message
    if (state.transitionTimer > 2 && !celebrationPlaying) {
      startCelebrationMusic();
    }
    
    // After 3 seconds, show completion overlay
    if (state.transitionTimer > 3 && state.mode === "transition") {
      state.mode = "missioncomplete";
      setOverlay(`
        <h1 class="ok">🎉 Good job, Captain! 🎉</h1>
        <p>Mission ${state.mission} Complete!</p>
        <p>Score: ⭐ ${state.score}</p>
        <p class="subtle">Press <span class="kbd">Space</span> for Mission ${state.mission + 1}.</p>
      `);
    }
    
    updateFireworks(dt);
    updateParticles(dt);
  }

  function gameOver() {
    state.mode = "gameover";
    stopMusic();
    uiStatus.textContent = "Game Over!";
    setOverlay(`
      <h1 class="danger">💥 Ship Destroyed!</h1>
      <p>You reached Mission ${state.mission}</p>
      <p>Final Score: ⭐ ${state.score}</p>
      <p class="subtle">Press <span class="kbd">Space</span> to try again.</p>
    `);
  }

  function showIntro() {
    state.mode = "intro";
    state.px = canvas.width / 2;
    state.py = canvas.height - 60;
    uiMission.textContent = `Mission 1`;
    uiLives.textContent = `Lives: 3`;
    uiTimer.textContent = '60';
    uiStatus.textContent = "Ready!";
    setOverlay(`
      <h1>🚀 Asteroid Blaster!</h1>
      <p>Destroy asteroids and survive each 60-second mission!</p>
      <p class="subtle">Use <span class="kbd">←</span> <span class="kbd">→</span> to move, <span class="kbd">Space</span> to shoot.</p>
      <p class="subtle">Collect power-ups: 🛡️ Shield, 🔱 Triple Shot, ⚡ Rapid Fire, 🌟 Spread, 💖 Life, 🕐 Slow Time, 💥 Bomb</p>
      <p>Press <span class="kbd">Space</span> to begin!</p>
    `);
  }

  // ---------- Main loop ----------
  function tick(tNow) {
    if (!state.lastT) state.lastT = tNow;
    const dt = Math.min(0.033, (tNow - state.lastT) / 1000);
    state.lastT = tNow;

    updateStars(dt);

    if (state.mode === "playing") {
      movePlayer(dt);
      
      // Shooting
      if (keys.has(" ") || touchFiring) {
        shoot();
      }
      
      updateLasers(dt);
      updateAsteroids(dt);
      updatePowerups(dt);
      updatePowerupTimers(dt);
      updateExplosions(dt);
      updateParticles(dt);
      checkCollisions();
      
      // Update timer
      state.timeRemaining -= dt;
      uiTimer.textContent = Math.ceil(Math.max(0, state.timeRemaining));
      
      // Check mission complete
      if (state.timeRemaining <= 0) {
        missionComplete();
      }
    } else if (state.mode === "transition") {
      updateTransition(dt);
    } else if (state.mode === "missioncomplete") {
      updateFireworks(dt);
      updateParticles(dt);
      
      // Keep spawning fireworks
      if (Math.random() < dt * 2) {
        spawnFirework();
      }
    }

    drawFrame(tNow);
    requestAnimationFrame(tick);
  }

  // ---------- Setup ----------
  function init() {
    resizeCanvas();
    initStars();
    showIntro();
    requestAnimationFrame(tick);
  }

  init();

  canvas.addEventListener("pointerdown", () => canvas.focus?.());
})();
</script>
